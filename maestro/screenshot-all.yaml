appId: com.avmillabs.brdg
tags:
  - screenshot
  - all
---
# ============================================================
# BRDG — Screenshot Every Screen (Expanded)
# ============================================================
# Auto-login kicks in on dev builds when no token is stored.
# Strategy: let auto-login complete, screenshot main screens,
# then logout to capture auth screens.
#
# Run: cd maestro && maestro test screenshot-all.yaml
# Output: screenshots/
#
# Coverage:
#   01 - Login screen
#   02 - Signup screen
#   03 - Discover (Home) with swipe deck
#   04 - Explore (events/spots nearby)
#   05 - Create (event form)
#   06 - Inbox (matches list)
#   07 - Profile (own profile)
#   08 - Chat (conversation thread)
#   09 - Notifications feed
#   10 - Event detail (from Explore)
#   11 - Profile detail (from Discovery card)
#   12 - My Events list
#   13 - Discovery filter sheet
# ============================================================

# ------ Stop and relaunch app with clean state ------
- stopApp
- launchApp:
    clearState: true
    clearKeychain: true

# Handle Expo dev client — select the local server
- runFlow:
    when:
      visible: "DEVELOPMENT SERVERS"
    commands:
      - tapOn: "http://localhost:8081"
      - waitForAnimationToEnd

# ============================================================
# Wait for JS bundle to load. The dev menu or the app itself
# will appear. We wait for "BRDG" text to know hierarchy is stable.
# ============================================================
- extendedWaitUntil:
    visible: "BRDG"
    timeout: 60000

# Dismiss Expo dev menus in order of appearance
- runFlow:
    when:
      visible: "Not Now"
    commands:
      - tapOn: "Not Now"
      - waitForAnimationToEnd

- runFlow:
    when:
      visible:
        text: "Continue"
        below: "Runtime version"
    commands:
      - tapOn:
          text: "Continue"
          below: "Runtime version"
      - waitForAnimationToEnd

- runFlow:
    when:
      visible: "Go home"
    commands:
      - tapOn:
          point: "86%,27%"
      - waitForAnimationToEnd

# Now wait for the main screen to be visible (auto-login completes)
- extendedWaitUntil:
    visible:
      id: "main-screen"
    timeout: 30000
- waitForAnimationToEnd

# ============================================================
# MAIN APP SCREENS
# ============================================================

# ------ Tab 1: Discover (Home) ------
- takeScreenshot: screenshots/03-discover-screen

# ------ Discovery Filter Sheet ------
- runFlow:
    when:
      visible:
        text: ".*Refine.*"
    commands:
      - tapOn:
          text: ".*Refine.*"
      - waitForAnimationToEnd
      - takeScreenshot: screenshots/13-discovery-filter-sheet
      - swipe:
          direction: DOWN
          duration: 300
      - waitForAnimationToEnd

# ------ Profile Detail (tap discovery card to open) ------
- runFlow:
    when:
      visible:
        id: "discovery-deck-area"
    commands:
      - tapOn:
          id: "discovery-deck-area"
      - waitForAnimationToEnd
      - runFlow:
          when:
            visible:
              id: "back-button"
          commands:
            - takeScreenshot: screenshots/11-profile-detail-screen
            - tapOn:
                id: "back-button"
            - waitForAnimationToEnd

# ------ Tab 2: Explore ------
- tapOn:
    id: "tab-explore"
- waitForAnimationToEnd
- takeScreenshot: screenshots/04-explore-screen

# ------ Event Detail (tap first event card) ------
# Tap the event card via its accessibilityLabel (text inside buttons is absorbed)
- extendedWaitUntil:
    visible:
      text: ".*Event:.*"
    timeout: 10000
- tapOn:
    text: ".*Event:.*"
    index: 0
- waitForAnimationToEnd
- takeScreenshot: screenshots/10-event-detail-screen
- tapOn:
    id: "back-button"
- waitForAnimationToEnd

# ------ My Events ------
- tapOn: "View my events"
- waitForAnimationToEnd
- takeScreenshot: screenshots/12-my-events-screen
- tapOn:
    id: "back-button"
- waitForAnimationToEnd

# ------ Tab 3: Create ------
- tapOn:
    id: "tab-create"
- waitForAnimationToEnd
- takeScreenshot: screenshots/05-create-screen

# ------ Tab 4: Inbox / Matches ------
- tapOn:
    id: "tab-inbox"
- waitForAnimationToEnd
- takeScreenshot: screenshots/06-inbox-screen

# ------ Open Chat from a match ------
- runFlow:
    when:
      visible:
        point: "28%,38%"
    commands:
      - tapOn:
          point: "28%,38%"
      - waitForAnimationToEnd
      - runFlow:
          when:
            visible:
              id: "back-button"
          commands:
            - takeScreenshot: screenshots/08-chat-screen
            - tapOn:
                id: "back-button"
            - waitForAnimationToEnd

# ------ Tab 5: Profile / You ------
- tapOn:
    id: "tab-you"
- waitForAnimationToEnd
- takeScreenshot: screenshots/07-profile-screen

# ------ Notifications (via header icon on Discover) ------
- tapOn:
    id: "tab-discover"
- waitForAnimationToEnd
- tapOn:
    id: "notifications-button"
- waitForAnimationToEnd
- takeScreenshot: screenshots/09-notifications-screen
- runFlow:
    when:
      visible:
        id: "back-button"
    commands:
      - tapOn:
          id: "back-button"
      - waitForAnimationToEnd

# ============================================================
# AUTH SCREENS — logout, then capture
# ============================================================

- tapOn:
    id: "tab-you"
- waitForAnimationToEnd
- scrollUntilVisible:
    element:
      text: "Log out"
    direction: DOWN
    timeout: 20000
    speed: 60
    visibilityPercentage: 50
- tapOn: "Log out"
- waitForAnimationToEnd

# Wait for the login screen — give extra time for state transition
- extendedWaitUntil:
    visible:
      id: "login-submit-button"
    timeout: 30000
- takeScreenshot: screenshots/01-login-screen

# Navigate to Signup — scroll to reveal footer then tap
- swipe:
    direction: UP
    duration: 500
- waitForAnimationToEnd
- tapOn:
    text: ".*Join BRDG.*"
- waitForAnimationToEnd
# If the tap didn't navigate, the signup screenshot shows login (best effort)
- takeScreenshot: screenshots/02-signup-screen
